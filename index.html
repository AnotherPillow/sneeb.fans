<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sneeb fans</title>
    <meta content="sneeb.fans" property="og:title" />
    <meta property="og:image" content="https://cdn.nest.rip/uploads/aa93bcbc-147b-407f-bd26-dc333dd4f2a3.avif" />

    <meta name="twitter:image" content="https://cdn.nest.rip/uploads/aa93bcbc-147b-407f-bd26-dc333dd4f2a3.avif" />
    <style>
        #main {
            width: 100%;
            height: 100%;
            
            inset: 0;
            position: absolute;
            
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            background: #1a1a1a;
        }

        p {
            font-family: sans-serif;
            color: white;
            margin: 0;
        }

        #txt {
            height: 9em;
            width: fit-content;
        }

        #count {
            font-size: 7em;
        }

        #info {
            font-size: 1.5em;
            color: #777;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="txt">
            <p id="count"></p>
            <p id="info">loyal followers of the sneeb</p>
        </div>
    </div>
    <script type="module">
        window.count.innerText = (await fetch(`https://discord.com/api/v9/invites/YpXbfjPW?with_counts=true&with_expiration=true`).then(r => r.json())).profile.member_count
    </script>
